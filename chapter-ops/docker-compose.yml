services:
  postgres:
    image: postgres:16-alpine
    container_name: chapterops-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: chapterops
      POSTGRES_USER: chapterops
      POSTGRES_PASSWORD: chapterops_dev
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chapterops"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chapterops-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
